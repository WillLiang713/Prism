services:
  prism:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism
    restart: unless-stopped
    ports:
      - "${PRISM_PORT:-3000}:3000"
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
