<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型对比</title>
    <link rel="stylesheet" href="style.css">
    <!-- Markdown解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/languages/bash.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 聊天区域 -->
        <div class="chat-layout">
            <section class="chat-panel">
                <div class="chat-header">
                    <div class="header-model-chips" aria-label="当前模型">
                        <div class="model-chip model-chip-a">
                            <span class="chip-dot" aria-hidden="true"></span>
                            <span class="chip-label">A</span>
                            <span class="chip-id" id="modelNameA">未配置</span>
                            <span class="status" id="statusA">就绪</span>
                        </div>
                        <div class="model-chip model-chip-b">
                            <span class="chip-dot" aria-hidden="true"></span>
                            <span class="chip-label">B</span>
                            <span class="chip-id" id="modelNameB">未配置</span>
                            <span class="status" id="statusB">就绪</span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="btn btn-secondary" id="openConfigBtn">配置</button>
                    </div>
                </div>

                <div class="chat-body">
                    <div class="chat-side" aria-label="话题与历史">
                        <div class="sidebar-section">
                            <div class="sidebar-header">
                                <h3>话题</h3>
                                <div class="sidebar-actions">
                                    <button class="btn btn-secondary btn-small" id="newTopicBtn">新建</button>
                                    <button class="btn btn-secondary btn-small" id="deleteTopicBtn" title="删除当前话题">删除</button>
                                </div>
                            </div>
                            <div class="topic-list" id="topicList"></div>
                        </div>

                        <div class="sidebar-divider"></div>

                        <div class="sidebar-section">
                            <div class="sidebar-header">
                                <h3>历史</h3>
                            </div>
                            <div class="history-list" id="historyList"></div>
                        </div>
                    </div>

                    <div class="chat-thread" aria-label="聊天">
                        <div class="chat-messages" id="chatMessages"></div>

                        <!-- 输入区域（固定在聊天卡片底部） -->
                        <div class="chat-composer">
                            <div class="composer-box">
                                <div class="composer-bar">
                                    <textarea id="promptInput" placeholder="输入你的问题..."></textarea>
                                    <button class="btn btn-primary action-btn" id="sendBtn" data-mode="send" title="发送" aria-label="发送">
                                        <span class="action-label label-send">发送</span>
                                        <span class="action-label label-stop">停止</span>
                                    </button>
                                </div>
                                <div class="composer-options">
                                    <label class="switch">
                                        <input type="checkbox" id="enableWebSearch">
                                        <span class="switch-track" aria-hidden="true"></span>
                                        <span class="switch-text">联网搜索</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- 配置弹窗 -->
    <div class="modal-overlay" id="configModal" aria-hidden="true">
        <div class="modal-content">
            <div class="config-panel" id="configPanel">
                <div class="config-header">
                    <h2>配置</h2>
                    <div class="config-header-actions">
                        <button class="toggle-btn" id="closeConfigBtn">关闭</button>
                    </div>
                </div>
                <div class="config-content" id="configContent">
                    <div class="config-row">
                        <!-- 左侧AI配置 -->
                        <div class="config-section">
                            <h3>模型 A</h3>
                            <div class="form-group">
                                <label>API提供商</label>
                                <select id="providerA">
                                    <option value="openai">OpenAI</option>
                                    <option value="anthropic">Anthropic</option>
                                    <option value="custom">自定义</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>API密钥</label>
                                <input type="password" id="apiKeyA" placeholder="输入API密钥">
                            </div>
                            <div class="form-group">
                                <label>模型</label>
                                <input type="text" id="modelA" placeholder="例如: gpt-4">
                            </div>
                            <div class="form-group">
                                <label>API地址（自定义时）</label>
                                <input type="text" id="apiUrlA" placeholder="https://api.example.com/v1/chat/completions">
                            </div>
                            <div class="form-group">
                                <label>系统提示词（可选）</label>
                                <textarea id="systemPromptA" rows="3" placeholder="例如：你是一个专业的编程助手，擅长解释代码和提供最佳实践建议"></textarea>
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="thinkingA">
                                    启用思考模式
                                </label>
                            </div>
                        </div>

                        <!-- 右侧AI配置 -->
                        <div class="config-section">
                            <h3>模型 B</h3>
                            <div class="form-group">
                                <label>API提供商</label>
                                <select id="providerB">
                                    <option value="openai">OpenAI</option>
                                    <option value="anthropic">Anthropic</option>
                                    <option value="custom">自定义</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>API密钥</label>
                                <input type="password" id="apiKeyB" placeholder="输入API密钥">
                            </div>
                            <div class="form-group">
                                <label>模型</label>
                                <input type="text" id="modelB" placeholder="例如: claude-3-opus">
                            </div>
                            <div class="form-group">
                                <label>API地址（自定义时）</label>
                                <input type="text" id="apiUrlB" placeholder="https://api.example.com/v1/messages">
                            </div>
                            <div class="form-group">
                                <label>系统提示词（可选）</label>
                                <textarea id="systemPromptB" rows="3" placeholder="例如：你是一个专业的编程助手，擅长解释代码和提供最佳实践建议"></textarea>
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="thinkingB">
                                    启用思考模式
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="global-config">
                        <h3>联网搜索（Tavily）</h3>
                        <div class="form-group">
                            <label>Tavily API Key</label>
                            <input type="password" id="tavilyApiKey" placeholder="tvly-...">
                        </div>
                    </div>
                    <div class="global-config">
                        <h3>时间上下文</h3>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="injectCurrentTime">
                                在系统提示词中注入当前时间
                            </label>
                        </div>
                    </div>
                    <div class="config-actions">
                        <button class="btn btn-primary" id="saveConfig">保存</button>
                        <button class="btn btn-secondary" id="clearConfig">清除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
