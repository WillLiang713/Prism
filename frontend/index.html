<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型对比工具</title>
    <link rel="stylesheet" href="style.css">
    <!-- Markdown解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 配置面板 -->
        <div class="config-panel" id="configPanel">
            <div class="config-header">
                <h2>配置面板</h2>
                <button class="toggle-btn" id="toggleConfig">收起</button>
            </div>
            <div class="config-content" id="configContent">
                <div class="config-row">
                    <!-- 左侧AI配置 -->
                    <div class="config-section">
                        <h3>AI模型 A</h3>
                        <div class="form-group">
                            <label>API提供商</label>
                            <select id="providerA">
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>API密钥</label>
                            <input type="password" id="apiKeyA" placeholder="输入API密钥">
                        </div>
                        <div class="form-group">
                            <label>模型</label>
                            <input type="text" id="modelA" placeholder="例如: gpt-4">
                        </div>
                        <div class="form-group">
                            <label>API地址（自定义时）</label>
                            <input type="text" id="apiUrlA" placeholder="https://api.example.com/v1/chat/completions">
                        </div>
                        <div class="form-group">
                            <label>系统提示词（可选）</label>
                            <textarea id="systemPromptA" rows="3" placeholder="例如：你是一个专业的编程助手，擅长解释代码和提供最佳实践建议"></textarea>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="thinkingA">
                                启用思考模式
                            </label>
                        </div>
                    </div>

                    <!-- 右侧AI配置 -->
                    <div class="config-section">
                        <h3>AI模型 B</h3>
                        <div class="form-group">
                            <label>API提供商</label>
                            <select id="providerB">
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>API密钥</label>
                            <input type="password" id="apiKeyB" placeholder="输入API密钥">
                        </div>
                        <div class="form-group">
                            <label>模型</label>
                            <input type="text" id="modelB" placeholder="例如: claude-3-opus">
                        </div>
                        <div class="form-group">
                            <label>API地址（自定义时）</label>
                            <input type="text" id="apiUrlB" placeholder="https://api.example.com/v1/messages">
                        </div>
                        <div class="form-group">
                            <label>系统提示词（可选）</label>
                            <textarea id="systemPromptB" rows="3" placeholder="例如：你是一个专业的编程助手，擅长解释代码和提供最佳实践建议"></textarea>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="thinkingB">
                                启用思考模式
                            </label>
                        </div>
                    </div>
                </div>
                <div class="config-actions">
                    <button class="btn btn-primary" id="saveConfig">保存配置</button>
                    <button class="btn btn-secondary" id="clearConfig">清除配置</button>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <textarea id="promptInput" placeholder="输入你的问题..."></textarea>
            <div class="input-actions">
                <button class="btn btn-primary" id="sendBtn">发送</button>
                <button class="btn btn-secondary" id="stopBtn" disabled>停止</button>
                <button class="btn btn-secondary" id="clearBtn">清空</button>
            </div>
        </div>

        <!-- 对比输出区域 -->
        <div class="comparison-section">
            <!-- 左侧AI输出 -->
            <div class="output-panel">
                <div class="output-header">
                    <h3>模型 A</h3>
                    <span class="model-name" id="modelNameA">未配置</span>
                    <span class="status" id="statusA">就绪</span>
                </div>
                <div class="output-content">
                    <div class="thinking-section" id="thinkingSectionA" style="display: none;">
                        <div class="thinking-header">
                            <span>思考过程</span>
                            <span class="thinking-time" id="thinkingTimeA"></span>
                        </div>
                        <div class="thinking-content" id="thinkingContentA"></div>
                    </div>
                    <div class="response-section">
                        <div class="response-content" id="responseA"></div>
                    </div>
                </div>
                <div class="output-footer">
                    <span class="token-count" id="tokenCountA">0 tokens</span>
                    <span class="time-cost" id="timeCostA">0.0s</span>
                </div>
            </div>

            <!-- 右侧AI输出 -->
            <div class="output-panel">
                <div class="output-header">
                    <h3>模型 B</h3>
                    <span class="model-name" id="modelNameB">未配置</span>
                    <span class="status" id="statusB">就绪</span>
                </div>
                <div class="output-content">
                    <div class="thinking-section" id="thinkingSectionB" style="display: none;">
                        <div class="thinking-header">
                            <span>思考过程</span>
                            <span class="thinking-time" id="thinkingTimeB"></span>
                        </div>
                        <div class="thinking-content" id="thinkingContentB"></div>
                    </div>
                    <div class="response-section">
                        <div class="response-content" id="responseB"></div>
                    </div>
                </div>
                <div class="output-footer">
                    <span class="token-count" id="tokenCountB">0 tokens</span>
                    <span class="time-cost" id="timeCostB">0.0s</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
