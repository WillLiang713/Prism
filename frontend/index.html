<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Prism</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/topics.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <link rel="stylesheet" href="css/message-assistant.css" />
    <link rel="stylesheet" href="css/web-search.css" />
    <link rel="stylesheet" href="css/composer.css" />
    <link rel="stylesheet" href="css/images.css" />
    <link rel="stylesheet" href="css/buttons.css" />
    <link rel="stylesheet" href="css/config.css" />
    <link rel="stylesheet" href="css/thinking.css" />
    <link rel="stylesheet" href="css/tools.css" />
    <link rel="stylesheet" href="css/sources.css" />
    <link rel="stylesheet" href="css/content.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script>
      // 破坏 WebView2 对 CSS 文件的缓存，确保每次构建加载最新样式
      document.querySelectorAll('link[rel="stylesheet"]').forEach(function (link) {
        var href = link.getAttribute("href");
        if (href && !href.startsWith("http")) {
          link.setAttribute("href", href + "?v=__BUILD__");
        }
      });
    </script>
    <!-- Markdown解析库 -->
    <script src="libs/marked/marked.min.js"></script>
    <!-- 代码高亮库 -->
    <link rel="stylesheet" href="libs/highlight.js/styles/github.min.css" />
    <script src="libs/highlight.js/highlight.min.js"></script>
    <script src="libs/highlight.js/languages/javascript.min.js"></script>
    <script src="libs/highlight.js/languages/python.min.js"></script>
    <script src="libs/highlight.js/languages/java.min.js"></script>
    <script src="libs/highlight.js/languages/cpp.min.js"></script>
    <script src="libs/highlight.js/languages/bash.min.js"></script>
  </head>
  <body>
    <div class="container">
      <!-- 聊天区域 -->
      <div class="chat-layout">
        <section class="chat-panel">
          <div class="chat-side" aria-label="话题">
            <div class="sidebar-section">
              <div class="sidebar-top-bar">
                <button class="topic-new-btn" id="newTopicBtn" title="新建话题 (Ctrl/Cmd+Alt+N)">
                  <span class="topic-new-icon">+</span>
                  <span class="topic-new-text">新建</span>
                </button>
                <button
                  class="sidebar-toggle-handle"
                  id="toggleSidebarBtn"
                  title="收起侧栏"
                >
                  <svg
                    viewBox="0 0 24 24"
                    width="14"
                    height="14"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="15 18 9 12 15 6"></polyline>
                  </svg>
                </button>
              </div>
              <div class="topic-list" id="topicList">
              </div>
            </div>
          </div>

          <div class="chat-main">
            <div class="chat-header" id="desktopTitlebar">
              <button
                class="sidebar-expand-btn no-drag"
                id="expandSidebarBtn"
                title="展开侧栏"
              >
                <svg
                  viewBox="0 0 24 24"
                  width="14"
                  height="14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
              <div class="header-brand desktop-drag-region" aria-label="模型信息" data-tauri-drag-region>
                <div class="brand-meta">
                  <span class="brand-model" id="headerModelInfo">
                    <span class="brand-model-id" id="modelName"></span>
                  </span>
                </div>
              </div>
              <div class="chat-actions">
                <button class="btn btn-secondary btn-settings no-drag" id="openConfigBtn" title="设置" aria-label="设置">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.02a1.65 1.65 0 0 0 .98-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 .98 1.51h.02a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.02a1.65 1.65 0 0 0 1.51.98H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51.98z"></path>
                  </svg>
                  <span class="sr-only">设置</span>
                </button>
                <div class="desktop-window-controls" id="desktopWindowControls" aria-label="窗口控制">
                  <button
                    class="desktop-window-btn no-drag"
                    id="windowMinimizeBtn"
                    type="button"
                    title="最小化"
                    aria-label="最小化"
                  >
                    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
                      <path d="M2 6h8"></path>
                    </svg>
                  </button>
                  <button
                    class="desktop-window-btn no-drag"
                    id="windowMaximizeBtn"
                    type="button"
                    title="最大化"
                    aria-label="最大化"
                  >
                    <svg class="icon-maximize" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
                      <rect x="2.5" y="2.5" width="7" height="7" rx="0.8"></rect>
                    </svg>
                    <svg class="icon-restore" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
                      <path d="M4 2.5h4.5v4.5"></path>
                      <path d="M3.5 4.5h5v5h-5z"></path>
                    </svg>
                  </button>
                  <button
                    class="desktop-window-btn desktop-window-btn-close no-drag"
                    id="windowCloseBtn"
                    type="button"
                    title="关闭"
                    aria-label="关闭"
                  >
                    <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">
                      <path d="M3 3l6 6"></path>
                      <path d="M9 3l-6 6"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <div class="chat-body">

            <div class="chat-thread" aria-label="聊天">
              <div class="chat-messages-wrapper">
                <div class="chat-messages" id="chatMessages"></div>
              </div>

              <!-- 输入区域（固定在聊天卡片底部） -->
              <div class="chat-composer">
                <div class="composer-wrapper">
                  <!-- 滚动到底部按钮 -->
                  <button
                    class="scroll-to-bottom-btn"
                    id="scrollToBottomBtn"
                    style="display: none"
                    title="滚动到底部"
                  >
                    <svg
                      viewBox="0 0 24 24"
                      width="20"
                      height="20"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                  </button>
                  <div class="composer-box">
                    <!-- 图片预览区域（输入框内部上方） -->
                    <div
                      class="image-preview-container"
                      id="imagePreviewContainer"
                      style="display: none"
                    ></div>
                    <textarea
                      id="promptInput"
                      placeholder="随便聊点什么吧"
                    ></textarea>

                    <div class="composer-footer">
                      <div class="composer-toolbar">
                        <input
                          type="file"
                          id="imageInput"
                          accept="image/*"
                          multiple
                          style="display: none"
                        />

                        <button
                          class="toolbar-btn icon-only"
                          id="imageUploadBtn"
                          title="上传图片"
                          aria-label="上传图片"
                        >
                          <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2.2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          >
                            <path d="M12 5v14"></path>
                            <path d="M5 12h14"></path>
                          </svg>
                        </button>

                        <label class="toolbar-switch" title="允许模型按需联网">
                          <input type="checkbox" id="enableWebSearch" />
                          <span class="switch-track" aria-hidden="true"></span>
                          <span class="switch-text">联网</span>
                        </label>


                        <div class="reasoning-effort-selector" id="reasoningEffortSelector" title="思考强度">
                          <span class="reasoning-effort-current">
                            <span class="reasoning-effort-label">思考</span>
                            <span class="reasoning-effort-value" id="reasoningEffortValue">中</span>
                            <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 5 6 8 9 5"></polyline></svg>
                          </span>
                          <div class="reasoning-effort-dropdown" id="reasoningEffortDropdown">
                            <button type="button" data-value="none" data-label="关">关</button>
                            <button type="button" data-value="minimal" data-label="微">微</button>
                            <button type="button" data-value="low" data-label="低">低</button>
                            <button type="button" data-value="medium" data-label="中" class="active">中</button>
                            <button type="button" data-value="high" data-label="高">高</button>
                            <button type="button" data-value="xhigh" data-label="极高">极高</button>
                          </div>
                        </div>
                      </div>

                      <button
                        class="btn btn-primary send-button"
                        id="sendBtn"
                        data-mode="send"
                        title="发送"
                        aria-label="发送"
                      >
                        <span class="action-label label-send">发送</span>
                        <span class="action-label label-stop">停止</span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          </div>
        </section>
      </div>
    </div>

    <!-- 配置弹窗 -->
    <div class="modal-overlay" id="configModal" aria-hidden="true">
      <div class="modal-content">
        <div class="config-panel" id="configPanel">
          <div class="config-header">
            <div class="config-header-title">
              <h2>配置中心</h2>
            </div>
          </div>
          <div class="config-tabs" id="configTabs" role="tablist" aria-label="配置分组">
            <button
              type="button"
              class="config-tab is-active"
              id="configTabModel"
              data-tab="model"
              role="tab"
              aria-selected="true"
              aria-controls="configPanelModel"
            >
              模型
            </button>
            <button
              type="button"
              class="config-tab"
              id="configTabWeb"
              data-tab="web"
              role="tab"
              aria-selected="false"
              aria-controls="configPanelWeb"
            >
              联网
            </button>
            <button
              type="button"
              class="config-tab"
              id="configTabShortcuts"
              data-tab="shortcuts"
              role="tab"
              aria-selected="false"
              aria-controls="configPanelShortcuts"
            >
              快捷键
            </button>
          </div>


          <div class="config-content" id="configContent">
            <section
              class="config-tab-panel is-active"
              id="configPanelModel"
              data-panel="model"
              role="tabpanel"
              aria-labelledby="configTabModel"
            >
            <div class="config-row">
              <!-- AI模型配置 -->
              <div class="config-section config-section-model">
                <div class="model-config-layout">
                  <div class="model-config-main">
                    <h4 class="config-subtitle">必填</h4>
                    <div class="form-group">
                      <label for="providerPickerInput">API 提供商</label>
                      <select id="provider" class="config-native-select" aria-hidden="true" tabindex="-1">
                        <option value="openai">OpenAI 兼容</option>
                        <option value="anthropic">Anthropic 兼容</option>
                      </select>
                      <div class="model-picker config-static-picker" data-picker="provider">
                        <div class="model-picker-row">
                          <input
                            type="text"
                            id="providerPickerInput"
                            placeholder="选择提供商"
                            readonly
                          />
                          <button
                            type="button"
                            class="model-picker-btn"
                            id="providerPickerBtn"
                            aria-label="打开提供商列表"
                            aria-expanded="false"
                          ></button>
                        </div>
                        <div
                          class="model-dropdown"
                          id="providerPickerDropdown"
                          hidden
                        ></div>
                      </div>
                    </div>
                    <div class="form-group">
                      <label for="model">模型</label>
                      <div class="model-picker" data-side="main">
                        <div class="model-picker-row">
                          <input
                            type="text"
                            id="model"
                            placeholder="例如: gpt-5"
                            autocomplete="off"
                            autocorrect="off"
                            autocapitalize="off"
                            spellcheck="false"
                          />
                          <button
                            type="button"
                            class="model-picker-btn"
                            id="modelDropdownBtn"
                            aria-label="打开模型列表"
                            aria-expanded="false"
                          ></button>
                        </div>
                        <div
                          class="model-dropdown"
                          id="modelDropdown"
                          hidden
                        ></div>
                      </div>
                      <div class="form-hint" id="modelHint">
                        填模型ID；支持自动获取和手动输入
                      </div>
                    </div>
                    <div class="required-credentials-grid">
                      <div class="form-group">
                      <label for="apiKey">API 密钥</label>
                      <div class="password-input-wrapper">
                      <input
                        type="password"
                        id="apiKey"
                        placeholder="输入API密钥"
                      />
                      <button type="button" class="password-toggle-btn" data-target="apiKey" title="显示/隐藏密钥">
                        <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                      </button>
                      </div>
                      </div>
                      <div class="form-group">
                      <label for="apiUrl">API 地址</label>
                      <input
                        type="text"
                        id="apiUrl"
                        placeholder="https://api.example.com/v1/chat/completions"
                        required
                      />
                      </div>
                    </div>
                  </div>
                  <div class="model-config-side">
                    <h4 class="config-subtitle">可选</h4>
                    <div class="form-group">
                      <label for="modelCustomName">模型自定义名称</label>
                      <input type="text" id="modelCustomName" />
                      <div class="form-hint">
                        设置后聊天界面优先显示该名称；留空则显示模型 ID
                      </div>
                    </div>
                    <div class="form-group">
                      <label for="roleSetting">角色设定</label>
                      <textarea
                        id="roleSetting"
                        rows="3"
                        placeholder="你是一个实时信息优先的中文助手，回答目标是：准确、及时、可核实。&#10;请把以下时间作为本轮对话的判断基准：&#10;- 当前日期时间：{{datetime}}&#10;- 当前日期：{{date}}&#10;- 当前时间：{{time}}&#10;- 当前时间戳：{{timestamp}}&#10;&#10;【核心原则】&#10;1) 只要问题可能受时间影响，就先联网搜索，再回答。&#10;2) 不凭记忆猜最新消息；不确定就查证。&#10;3) 若证据不足，明确说不确定，不要编造。&#10;&#10;【必须优先联网的场景】&#10;- 用户出现今天、现在、当前、刚刚、最新、最近、实时、截至等词。&#10;- 新闻动态、政策变化、价格/汇率/股价、天气、比赛结果、航班交通、软件版本更新等易变化信息。&#10;- 任何需要此刻仍然成立的结论。&#10;- 你主观把握不足（低于90%把握）时。&#10;&#10;【联网执行规则】&#10;1) 判定需要联网后，先调用搜索工具，再输出正式答案。&#10;2) 重要问题至少进行两次检索（换关键词再查一次）并交叉核对。&#10;3) 检索词尽量包含：主题 + 时间范围 + 地区/对象。&#10;4) 若首次结果不够新或不够全，自动补搜，不要直接结束。&#10;&#10;【回答输出规则】&#10;1) 先给结论，再给关键依据（时间点、数字、适用条件）。&#10;2) 明确标注已确认信息和可能变化信息。&#10;3) 来源链接会在界面自动展示，正文中不要重复堆链接。&#10;4) 搜索失败时，清楚说明失败原因，并给出可执行的下一步（如建议稍后重试或提供更具体关键词）。&#10;&#10;【无需联网的场景】&#10;- 稳定基础知识、数学推导、代码语法、通用写作润色（除非用户明确要求最新资料）。"
                      ></textarea>
                      <div
                        id="roleSettingPreview"
                        class="role-setting-preview response-content"
                        tabindex="0"
                        hidden
                      ></div>
                      <div class="form-hint">
                        留空用内置提示词，填写即覆盖。支持 {{datetime}} {{date}} {{time}} {{timestamp}}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            </section>
            <section
              class="config-tab-panel"
              id="configPanelWeb"
              data-panel="web"
              role="tabpanel"
              aria-labelledby="configTabWeb"
              hidden
            >
            <div class="global-config">
              <div class="web-config-layout">
                <div class="web-config-main">
                  <div class="form-group" id="webSearchProviderGroup">
                    <label for="webSearchProviderPickerInput">联网服务</label>
                    <select id="webSearchProvider" class="config-native-select" aria-hidden="true" tabindex="-1">
                      <option value="tavily">Tavily</option>
                      <option value="exa">Exa</option>
                    </select>
                    <div class="model-picker config-static-picker" data-picker="webSearchProvider">
                      <div class="model-picker-row">
                        <input
                          type="text"
                          id="webSearchProviderPickerInput"
                          placeholder="选择联网服务"
                          readonly
                        />
                        <button
                          type="button"
                          class="model-picker-btn"
                          id="webSearchProviderPickerBtn"
                          aria-label="打开联网服务列表"
                          aria-expanded="false"
                        ></button>
                      </div>
                      <div
                        class="model-dropdown"
                        id="webSearchProviderPickerDropdown"
                        hidden
                      ></div>
                    </div>
                  </div>
                  <div class="form-group" id="tavilyApiKeyGroup">
                    <label for="tavilyApiKey">Tavily Key</label>
                    <div class="password-input-wrapper">
                    <input
                      type="password"
                      id="tavilyApiKey"
                      placeholder="tvly-..."
                    />
                    <button type="button" class="password-toggle-btn" data-target="tavilyApiKey" title="显示/隐藏密钥">
                      <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                    </div>
                    <div class="form-hint">
                      留空则使用服务端 `TAVILY_API_KEY`
                    </div>
                  </div>
                  <div class="form-group" id="exaApiKeyGroup">
                    <label for="exaApiKey">Exa Key</label>
                    <div class="password-input-wrapper">
                    <input
                      type="password"
                      id="exaApiKey"
                      placeholder="exa-..."
                    />
                    <button type="button" class="password-toggle-btn" data-target="exaApiKey" title="显示/隐藏密钥">
                      <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                    </div>
                    <div class="form-hint">
                      留空则使用服务端 `EXA_API_KEY`
                    </div>
                  </div>
                </div>
                <div class="web-config-side">
                  <div class="form-group" id="webSearchMaxResultsGroup">
                    <label for="tavilyMaxResults">结果数量</label>
                    <input
                      type="number"
                      id="tavilyMaxResults"
                      min="1"
                      max="20"
                      value="5"
                      class="input-compact"
                    />
                  </div>
                  <div class="form-group" id="tavilySearchDepthGroup">
                    <label for="tavilySearchDepthPickerInput">搜索深度</label>
                    <select id="tavilySearchDepth" class="config-native-select" aria-hidden="true" tabindex="-1">
                      <option value="basic">basic</option>
                      <option value="advanced">advanced</option>
                    </select>
                    <div class="model-picker config-static-picker" data-picker="tavilySearchDepth">
                      <div class="model-picker-row">
                        <input
                          type="text"
                          id="tavilySearchDepthPickerInput"
                          placeholder="选择搜索深度"
                          readonly
                        />
                        <button
                          type="button"
                          class="model-picker-btn"
                          id="tavilySearchDepthPickerBtn"
                          aria-label="打开搜索深度列表"
                          aria-expanded="false"
                        ></button>
                      </div>
                      <div
                        class="model-dropdown"
                        id="tavilySearchDepthPickerDropdown"
                        hidden
                      ></div>
                    </div>
                  </div>
                  <div class="form-group" id="exaSearchTypeGroup">
                    <label for="exaSearchTypePickerInput">Exa 搜索模式</label>
                    <select id="exaSearchType" class="config-native-select" aria-hidden="true" tabindex="-1">
                      <option value="auto">auto（智能混合）</option>
                      <option value="neural">neural（语义检索）</option>
                      <option value="fast">fast（快速检索）</option>
                      <option value="deep">deep（轻量深度）</option>
                      <option value="deep-reasoning">deep-reasoning（标准深度）</option>
                      <option value="deep-max">deep-max（最大深度）</option>
                      <option value="instant">instant（最低延迟）</option>
                    </select>
                    <div class="model-picker config-static-picker" data-picker="exaSearchType">
                      <div class="model-picker-row">
                        <input
                          type="text"
                          id="exaSearchTypePickerInput"
                          placeholder="选择 Exa 搜索模式"
                          readonly
                        />
                        <button
                          type="button"
                          class="model-picker-btn"
                          id="exaSearchTypePickerBtn"
                          aria-label="打开 Exa 搜索模式列表"
                          aria-expanded="false"
                        ></button>
                      </div>
                      <div
                        class="model-dropdown"
                        id="exaSearchTypePickerDropdown"
                        hidden
                      ></div>
                    </div>
                    <div class="form-hint">
                      可选：auto / neural / fast / deep / deep-reasoning / deep-max / instant
                    </div>
                  </div>
                </div>
              </div>
            </div>
            </section>
            <section
              class="config-tab-panel"
              id="configPanelShortcuts"
              data-panel="shortcuts"
              role="tabpanel"
              aria-labelledby="configTabShortcuts"
              hidden
            >
            <div class="global-config shortcuts-config">
              <div class="shortcut-config-intro">
                <h3>快捷键</h3>
                <p>所有全局快捷键都集中在这里查看。输入框聚焦时，仅保留编辑相关操作。</p>
              </div>
              <div class="shortcut-help-body shortcut-help-inline-body">
                <table class="shortcut-help-table" aria-label="快捷键列表">
                  <thead>
                    <tr>
                      <th scope="col">操作</th>
                      <th scope="col">按键</th>
                      <th scope="col">说明</th>
                    </tr>
                  </thead>
                  <tbody id="shortcutHelpList"></tbody>
                </table>
              </div>
            </div>
            </section>
          </div>
          <div class="config-footer">

            <div class="config-footer-actions">
              <button class="btn btn-primary btn-small" id="saveConfig">
                保存
              </button>
              <button class="btn btn-secondary btn-small" id="clearConfig">
                清除
              </button>
              <button class="btn btn-secondary btn-small" id="closeConfigBtn">
                关闭
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- 通用确认弹窗 -->
    <div class="modal-overlay modal-compact" id="promptConfirmModal" aria-hidden="true">
      <div class="modal-content modal-compact-content">
        <div class="config-panel confirm-panel">
          <div class="confirm-body">
            <div class="confirm-title" id="promptConfirmTitle">提示</div>
            <div class="confirm-text" id="promptConfirmMessage"></div>
            <div class="confirm-hint" id="promptConfirmHint"></div>
          </div>
          <div class="confirm-footer">
            <button
              class="btn btn-secondary btn-small"
              id="promptConfirmCancelBtn"
            >
              取消
            </button>
            <button
              class="btn btn-primary btn-small btn-danger"
              id="promptConfirmOkBtn"
            >
              确定
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
